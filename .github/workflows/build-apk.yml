name: Build Android APK

on:
  push:
    branches:
      - master
      - claude/**
    paths:
      - "android-grocery-pos/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "android-grocery-pos/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-grocery-pos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: grocery-pos-debug-apk
          path: android-grocery-pos/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
